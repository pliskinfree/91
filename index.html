<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="视频聚合站首页 Demo" />
    <title>视频聚合站</title>
    <!-- Premium Fonts Preconnect & Links -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!--
      在 React 挂载前，从 localStorage 同步上次保存的主题，立刻设到 <html data-theme>，
      避免"先黑后粉"的闪烁。真实的服务端值会在 main.tsx 启动时异步对齐。
    -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem("video-site:theme");
          if (t === "pink" || t === "dark") {
            document.documentElement.setAttribute("data-theme", t);
          } else {
            document.documentElement.setAttribute("data-theme", "dark");
          }
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "dark");
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
